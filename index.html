    }

    button {

      padding: 16px 24px;

<body>

 

<button onclick="shareFlex()">Share to LINE</button>

 

<script>

  const LIFF_ID = "2008366647-JBnX0Tky";

 

  async function init() {

    await liff.init({ liffId: LIFF_ID });

 

    if (!liff.isLoggedIn()) {

      liff.login();

    }

  }

 

  function getQueryParams() {

    const params = new URLSearchParams(window.location.search);

    return params.toString(); // return full query string

  }

 

  async function shareFlex() {

    const query = getQueryParams();

 

    // 👉 Your CTA destination (append params here)

    const targetUrl = "https://liff.line.me/2008717560-aJaTS7xt?" + query;

// alert("prep");

    const profile = await liff.getProfile();
//alert(profile.pictureUrl);
const flexMessage = {
  type: "flex",

  contents: 
  {

  contents: [

        action: {

        }

      body: {

          {

    try {

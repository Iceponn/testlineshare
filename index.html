<!DOCTYPE html>

<html>

<head>

  <meta charset="utf-8" />

  <title>LIFF Share</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    body {

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      font-family: Arial;

      background: #f5f5f5;

    }

    button {

      padding: 16px 24px;

      font-size: 18px;

      background: #D31145;

      color: white;

      border: none;

      border-radius: 12px;

      cursor: pointer;

    }

  </style>

</head>

<body>

 

<button onclick="shareFlex()">Share to LINE</button>

 

<script>

  const LIFF_ID = "2008366647-JBnX0Tky";

 

  async function init() {

    await liff.init({ liffId: LIFF_ID });

 

    if (!liff.isLoggedIn()) {

      liff.login();

    }

  }

 

  function getQueryParams() {

    const params = new URLSearchParams(window.location.search);

    return params.toString(); // return full query string

  }

 

  async function shareFlex() {

    const query = getQueryParams();

 

    // 👉 Your CTA destination (append params here)

    const targetUrl = "https://www.aia.co.th/th/events-promotions/promotions-rewards/dmtq126?" + query;

 

    const profile = await liff.getProfile();

const flexMessage = {
  type: "flex",
  altText: "Campaign Share",
  contents: {
    type: "carousel",
    contents: [
      // 👉 Bubble 1: Full Image
      {
        type: "bubble",
        hero: {
          type: "image",
          url: "https://cdn25.lemnisk.co/ssp/TH_AIA_PROD_DMP/d7394919-8296-4704-a1aa-aad7b3edcfff.png",
          size: "full",
          aspectRatio: "1:1",
          aspectMode: "cover",
          action: {
            type: "uri",
            uri: targetUrl
          }
        },
        body: {
          type: "box",
          layout: "vertical",
          contents: [],
          paddingAll: "0px"
        }
      },

      // 👉 Bubble 2: Banner + Profile + Text
      {
        type: "bubble",
        hero: {
          type: "image",
          url: "https://your-banner-image.jpg",
          size: "full",
          aspectRatio: "1:1",
          aspectMode: "cover"
        },
        body: {
          type: "box",
          layout: "vertical",
          spacing: "md",
          contents: [
            {
              type: "box",
              layout: "horizontal",
              spacing: "md",
              contents: [
                {
                  type: "image",
                  url: profile.pictureUrl,
                  size: "sm",
                  aspectRatio: "1:1",
                  aspectMode: "cover",
                  cornerRadius: "100px"
                },
                {
                  type: "text",
                  text: profile.displayName,
                  weight: "bold",
                  size: "md",
                  align: "start",
                  gravity: "center",
                  wrap: true
                }
              ]
            },
            {
              type: "text",
              text: "ชวนคุณมาดูแคมเปญพิเศษ 🎉 พร้อมสิทธิประโยชน์ดีๆ ที่ไม่ควรพลาด",
              size: "sm",
              color: "#666666",
              wrap: true
            }
          ]
        },
        footer: {
          type: "box",
          layout: "vertical",
          contents: [
            {
              type: "button",
              style: "primary",
              action: {
                type: "uri",
                label: "ดูรายละเอียด",
                uri: targetUrl
              }
            }
          ]
        }
      }
    ]
  }
};
 

    try {

      if (liff.isApiAvailable('shareTargetPicker')) {

        await liff.shareTargetPicker([flexMessage]);

      } else {

        alert("ShareTargetPicker not supported");

      }

    } catch (err) {

      console.error(err);

      alert("Share failed");

    }

  }

 

  init();

</script>

 

</body>

</html>

<!DOCTYPE html>

<html>

<head>

  <meta charset="utf-8" />

  <title>LIFF Share</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    body {

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      font-family: Arial;

      background: #f5f5f5;

    }

    button {

      padding: 16px 24px;

      font-size: 18px;

      background: #D31145;

      color: white;

      border: none;

      border-radius: 12px;

      cursor: pointer;

    }

  </style>

</head>

<body>

 

<button onclick="shareFlex()">Share to LINE</button>

 

<script>

  const LIFF_ID = "2008366647-JBnX0Tky";

 

  async function init() {

    await liff.init({ liffId: LIFF_ID });

 

    if (!liff.isLoggedIn()) {

      liff.login();

    }

  }

 

  function getQueryParams() {

    const params = new URLSearchParams(window.location.search);

    return params.toString(); // return full query string

  }

 

  async function shareFlex() {

    const query = getQueryParams();

 

    // 👉 Your CTA destination (append params here)

    const targetUrl = "https://www.aia.co.th/th/events-promotions/promotions-rewards/dmtq126?" + query;

 

    const flexMessage =

                {

      type: "flex",

      altText: "Check this out!",

      contents: {

        type: "bubble",

        body: {

          type: "box",

          layout: "vertical",

          contents: [

            {

              type: "text",

              text: "Special Offer 🎉",

              weight: "bold",

              size: "xl"

            },

            {

              type: "text",

              text: "Click below to learn more",

              size: "sm",

              color: "#666666",

              margin: "md"

            }

          ]

        },

        footer: {

          type: "box",

          layout: "vertical",

          contents: [

            {

              type: "button",

              style: "primary",

              action: {

                type: "uri",

                label: "View Now",

                uri: targetUrl

              }

            }

          ]

        }

      }

    };

 

    try {

      if (liff.isApiAvailable('shareTargetPicker')) {

        await liff.shareTargetPicker([flexMessage]);

      } else {

        alert("ShareTargetPicker not supported");

      }

    } catch (err) {

      console.error(err);

      alert("Share failed");

    }

  }

 

  init();

</script>

 

</body>

</html>
